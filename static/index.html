<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>J.A.R.V.I.S.</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*:focus-visible{outline-offset:0!important}

html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ── Gradient background — exact from demo ── */
body{
  background:radial-gradient(125% 125% at 50% 101%,
    rgba(245,87,2,1)   10.5%,
    rgba(245,120,2,1)  16%,
    rgba(245,140,2,1)  17.5%,
    rgba(245,170,100,1)25%,
    rgba(238,174,202,1)40%,
    rgba(202,179,214,1)65%,
    rgba(148,201,233,1)100%);
}

/* ── Page: flex-center like demo ── */
.page{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  transition:align-items .3s;
}
.page.chat-mode{
  align-items:stretch;
}

/* ── App container — 500px like demo's w-[500px] ── */
.app{
  width:100%;
  max-width:500px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
}
.app.chat-mode{
  /* fill the full padded viewport in chat */
  flex:1;
  min-height:0;
}

/* ── Welcome section ── */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;padding-bottom:24px;
  animation:fadeUp .3s ease;
}
.welcome.gone{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.w-title{
  font-size:clamp(32px,6vw,52px);font-weight:700;
  letter-spacing:.04em;color:rgba(255,255,255,.95);
  text-shadow:0 2px 24px rgba(0,0,0,.25);
  text-align:center;
}
.w-sub{
  font-size:13px;color:rgba(255,255,255,.5);
  letter-spacing:.08em;text-align:center;margin-top:-12px;
}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.chip{
  padding:7px 16px;border-radius:9999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:rgba(255,255,255,.75);font-size:12px;letter-spacing:.06em;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.chip:hover{
  border-color:rgba(255,255,255,.45);
  background:rgba(255,255,255,.22);
  color:#fff;
}

/* ── Chat header (only in chat mode) ── */
.chat-header{
  display:none;
  align-items:center;justify-content:space-between;
  padding:4px 2px 12px;flex-shrink:0;
}
.chat-header.visible{display:flex}
.ch-logo{font-size:11px;font-weight:700;letter-spacing:.3em;color:rgba(255,255,255,.55)}
.ch-badge{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.4)}
#dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .4s}
#dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e}

/* ── Messages ── */
.msgs-wrap{
  display:none;
  flex:1;overflow-y:auto;
  padding:0 2px 8px;
  min-height:0;
}
.msgs-wrap.visible{display:block}
.msgs-wrap::-webkit-scrollbar{width:4px}
.msgs-wrap::-webkit-scrollbar-track{background:transparent}
.msgs-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

#msgs{display:flex;flex-direction:column;gap:12px;justify-content:flex-end;min-height:100%}

.msg-row{display:flex;gap:8px;align-items:flex-start;animation:msgIn .22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row-reverse}

.msg-av{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.8) 0%,rgba(34,211,238,.35) 60%,transparent 100%);
  margin-top:2px;
}
.msg-bubble{
  max-width:80%;padding:9px 13px;border-radius:14px;
  font-size:13.5px;line-height:1.6;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.msg-row.jarvis .msg-bubble{
  background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.92);border-top-left-radius:4px;
}
.msg-row.user .msg-bubble{
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.9);border-top-right-radius:4px;
}

/* ── Status line ── */
.status-line{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:10px 2px 10px;flex-shrink:0;
}
.s-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s}
.s-dot.listening{background:#22d3a5;animation:blink 1.4s ease infinite}
.s-dot.processing{background:#fb923c;animation:blink .7s ease infinite}
.s-dot.speaking{background:#60a5fa;animation:blink 1s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
#status-txt{font-size:9px;font-weight:700;letter-spacing:.24em;color:rgba(255,255,255,.35);transition:color .3s}
#status-txt.listening{color:#22d3a5}
#status-txt.processing{color:#fb923c}
#status-txt.speaking{color:#60a5fa}
#perm{display:none;font-size:10px;color:#fb923c;background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.25);border-radius:8px;padding:3px 9px}
#perm.show{display:block}

/* ════════════════════════════════════════
   PROMPT INPUT BOX — exact React match
   ════════════════════════════════════════ */

/* PromptInput wrapper */
.prompt-box{
  width:100%;
  background:#1F2023;
  border:1px solid #444444;
  border-radius:24px;   /* rounded-3xl */
  padding:8px;          /* p-2 */
  box-shadow:0 8px 30px rgba(0,0,0,.24);
  transition:border-color .3s ease;
}
.prompt-box.recording,
.prompt-box.loading{border-color:rgba(239,68,68,.7)}

/* File previews */
.file-previews{
  display:none;flex-wrap:wrap;gap:8px;
  padding:0 0 4px; /* p-0 pb-1 */
}
.file-previews.show{display:flex}
.file-thumb{
  position:relative;width:64px;height:64px;
  border-radius:12px; /* rounded-xl */
  overflow:hidden;cursor:pointer;
  transition:opacity .15s;
}
.file-thumb:hover{opacity:.85}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-rm{
  position:absolute;top:4px;right:4px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.7);border:none;
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  padding:0;
}

/* VoiceRecorder — py-3, flex col center */
.rec-ui{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  width:100%;
  padding:12px 0 4px; /* py-3 */
  transition:all .3s;
}
.rec-ui.show{display:flex}
.rec-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.rec-dot{
  width:8px;height:8px;border-radius:50%;
  background:#EF4444;animation:blink .8s infinite;
}
.rec-time{font-family:monospace;font-size:13px;color:rgba(255,255,255,.8)}
.waveform{
  width:100%;height:40px;
  display:flex;align-items:center;justify-content:center;
  gap:2px;padding:0 16px;
}
.wave-bar{
  flex-shrink:0;width:2px;border-radius:9999px;
  background:rgba(255,255,255,.5);
  animation:wave ease-in-out infinite alternate;
}
@keyframes wave{from{transform:scaleY(.2);opacity:.4}to{transform:scaleY(1);opacity:1}}

/* Textarea — px-3 py-2.5 min-h-[44px] text-base */
#chat-ta{
  display:block;width:100%;
  background:transparent;border:none;outline:none;box-shadow:none;
  color:#F3F4F6;
  font-size:15px;line-height:1.55;
  font-family:inherit;resize:none;
  padding:10px 12px;  /* py-2.5 px-3 */
  min-height:44px;max-height:240px;overflow-y:auto;
}
#chat-ta::placeholder{color:#9CA3AF}
#chat-ta:disabled{cursor:not-allowed;opacity:.5}
#chat-ta::-webkit-scrollbar{width:6px}
#chat-ta::-webkit-scrollbar-track{background:transparent}
#chat-ta::-webkit-scrollbar-thumb{background:#444444;border-radius:3px}
#chat-ta::-webkit-scrollbar-thumb:hover{background:#555555}

/* Actions row — flex justify-between pt-2 gap-2 */
.actions-row{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;gap:8px;
}

/* Left actions — flex items-center gap-1 */
.left-acts{
  display:flex;align-items:center;
  gap:4px;flex:1;overflow:hidden;
  transition:opacity .3s,visibility .3s;
}
.left-acts.rec-hide{
  opacity:0;visibility:hidden;
  pointer-events:none;
  height:0;overflow:hidden;
}

/* Paperclip — h-8 w-8 rounded-full */
#attach-btn{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  border:none;background:transparent;
  color:#9CA3AF;cursor:pointer;
  flex-shrink:0;
  transition:background .15s,color .15s;
}
#attach-btn:hover{background:rgba(99,102,241,.15);color:#D1D5DB}
#file-input{display:none}

/* Toggle buttons — rounded-full h-8 px-2 py-1 border */
.tog{
  display:flex;align-items:center;
  gap:4px;height:32px;border-radius:9999px;
  border:1px solid transparent;
  background:transparent;color:#9CA3AF;
  cursor:pointer;
  padding:4px 8px;font-family:inherit;font-size:12px;
  transition:color .2s,background .2s,border-color .2s;
  flex-shrink:0;
}
.tog:hover{color:#D1D5DB}
.tog:disabled{pointer-events:none;opacity:.5}

.tog-icon{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tog-icon svg{
  width:16px;height:16px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.tog:hover .tog-icon svg{transform:rotate(15deg) scale(1.1)}

/* Toggle label — AnimatePresence: width 0→auto, opacity 0→1 */
.tog-lbl{
  max-width:0;overflow:hidden;opacity:0;
  transition:max-width .2s ease,opacity .2s ease;
  white-space:nowrap;font-size:12px;flex-shrink:0;
}

/* Active — Search */
.tog.active-search{
  border-color:#1EAEDB;
  background:rgba(30,174,219,.15);
  color:#1EAEDB;
}
.tog.active-search .tog-icon svg{transform:rotate(360deg) scale(1.1)}
.tog.active-search .tog-lbl{max-width:50px;opacity:1}

/* Active — Think */
.tog.active-think{
  border-color:#8B5CF6;
  background:rgba(139,92,246,.15);
  color:#8B5CF6;
}
.tog.active-think .tog-icon svg{transform:rotate(360deg) scale(1.1)}
.tog.active-think .tog-lbl{max-width:50px;opacity:1}

/* Active — Canvas */
.tog.active-canvas{
  border-color:#F97316;
  background:rgba(249,115,22,.15);
  color:#F97316;
}
.tog.active-canvas .tog-icon svg{transform:rotate(360deg) scale(1.1)}
.tog.active-canvas .tog-lbl{max-width:50px;opacity:1}

/* Diamond-notch gradient divider — exact from CustomDivider component */
.tog-sep{
  position:relative;
  width:1.5px;height:24px;
  margin:0 4px; /* mx-1 */
  flex-shrink:0;
}
.tog-sep::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(to top,transparent,rgba(155,135,245,.7),transparent);
  border-radius:9999px;
  clip-path:polygon(0% 0%,100% 0%,100% 40%,140% 50%,100% 60%,100% 100%,0% 100%,0% 60%,-40% 50%,0% 40%);
}

/* Action button — h-8 w-8 rounded-full */
#action-btn{
  width:32px;height:32px;
  border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s,transform .1s;
  flex-shrink:0;
}
#action-btn:active{transform:scale(.88)}

/* idle — bg-transparent text-[#9CA3AF] */
#action-btn.s-idle{background:transparent;color:#9CA3AF}
#action-btn.s-idle:hover{background:rgba(99,102,241,.15);color:#D1D5DB}

/* has-text — bg-white text-[#1F2023] */
#action-btn.s-text{background:#ffffff;color:#1F2023}
#action-btn.s-text:hover{background:rgba(255,255,255,.85)}

/* recording — bg-transparent text-red-500 */
#action-btn.s-rec{background:transparent;color:#EF4444}
#action-btn.s-rec:hover{background:rgba(255,255,255,.08);color:#FCA5A5}

/* loading — bg-white, pulsing square */
#action-btn.s-load{background:#ffffff;color:#1F2023}
@keyframes sqPulse{0%,100%{opacity:1}50%{opacity:.4}}
#action-btn.s-load svg{animation:sqPulse .8s ease-in-out infinite}

/* ── Image modal ── */
#img-modal{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
}
#img-modal.open{display:flex;animation:mFadeIn .2s ease}
@keyframes mFadeIn{from{opacity:0}to{opacity:1}}
.m-inner{
  position:relative;
  background:#1F2023;border:1px solid #333;
  border-radius:16px;overflow:hidden;
  max-width:min(90vw,800px);max-height:90vh;
  box-shadow:0 25px 50px rgba(0,0,0,.5);
  animation:mZoom .2s ease;
}
@keyframes mZoom{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.m-inner img{display:block;width:100%;max-height:80vh;object-fit:contain}
.m-close{
  position:absolute;top:12px;right:12px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:rgba(46,48,51,.8);border:none;
  color:#E5E7EB;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
  padding:0;
}
.m-close:hover{background:#2E3033;color:#fff}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="app" id="app">

    <!-- Welcome (hidden after first message) -->
    <div class="welcome" id="welcome">
      <div class="w-title">J.A.R.V.I.S.</div>
      <div class="w-sub">Just A Rather Very Intelligent System</div>
      <div class="chips">
        <button class="chip" onclick="sendQ('What time is it?')">What time is it?</button>
        <button class="chip" onclick="sendQ('Weather in Mumbai?')">Weather in Mumbai</button>
        <button class="chip" onclick="sendQ('Activate JARVIS mode lights')">JARVIS lights</button>
        <button class="chip" onclick="sendQ('What is my battery status?')">Battery status</button>
        <button class="chip" onclick="sendQ('Scan the local network')">Scan network</button>
        <button class="chip" onclick="sendQ('What song is playing?')">Now playing</button>
      </div>
    </div>

    <!-- Chat header (shows in chat mode) -->
    <div class="chat-header" id="chat-header">
      <span class="ch-logo">J.A.R.V.I.S.</span>
      <div class="ch-badge">
        <span id="conn-lbl">CONNECTING</span>
        <div id="dot"></div>
      </div>
    </div>

    <!-- Messages -->
    <div class="msgs-wrap" id="msgs-wrap">
      <div id="msgs"></div>
    </div>

    <!-- Status -->
    <div class="status-line">
      <div class="s-dot" id="s-dot"></div>
      <span id="status-txt">READY</span>
      <div id="perm">Microphone denied — allow it in browser settings</div>
    </div>

    <!-- PROMPT INPUT BOX -->
    <div class="prompt-box" id="prompt-box">

      <!-- File previews -->
      <div class="file-previews" id="file-previews"></div>

      <!-- Voice recorder (replaces textarea when recording) -->
      <div class="rec-ui" id="rec-ui">
        <div class="rec-top">
          <div class="rec-dot"></div>
          <span class="rec-time" id="rec-time">00:00</span>
        </div>
        <div class="waveform" id="waveform"></div>
      </div>

      <!-- Textarea -->
      <textarea id="chat-ta" rows="1" placeholder="Ask JARVIS anything…"></textarea>

      <!-- Actions row -->
      <div class="actions-row">

        <!-- Left: paperclip + toggles -->
        <div class="left-acts" id="left-acts">

          <button id="attach-btn" title="Upload image">
            <!-- Paperclip — Lucide -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="file" id="file-input" accept="image/*"/>

          <!-- Search toggle -->
          <button class="tog" id="tog-search" title="Search the web">
            <div class="tog-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
            </div>
            <span class="tog-lbl">Search</span>
          </button>

          <div class="tog-sep"></div>

          <!-- Think toggle — BrainCog (Lucide) -->
          <button class="tog" id="tog-think" title="Think deeply">
            <div class="tog-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
                <path d="M9 13a4.5 4.5 0 0 0 3-4"/>
                <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
                <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
                <path d="M6 18a4 4 0 0 1-1.967-.516"/>
                <path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/>
                <path d="M12 8h8"/><path d="M16 8V5c0-1.1.9-2 2-2"/>
                <circle cx="16" cy="13" r="3"/><circle cx="18" cy="3" r="2"/>
              </svg>
            </div>
            <span class="tog-lbl">Think</span>
          </button>

          <div class="tog-sep"></div>

          <!-- Canvas toggle — FolderCode (Lucide) -->
          <button class="tog" id="tog-canvas" title="Code canvas">
            <div class="tog-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 10.5 8 13l2 2.5"/>
                <path d="m14 10.5 2 2.5-2 2.5"/>
                <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
              </svg>
            </div>
            <span class="tog-lbl">Canvas</span>
          </button>

        </div>

        <!-- Right: action button -->
        <button id="action-btn" class="s-idle"></button>

      </div>
    </div>

  </div>
</div>

<!-- Image modal — ImageViewDialog -->
<div id="img-modal" onclick="if(event.target===this)closeModal()">
  <div class="m-inner">
    <button class="m-close" onclick="closeModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <img id="modal-img" src="" alt="Preview"/>
  </div>
</div>

<script>
/* ── Icons ── */
const ICON = {
  mic: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
  up:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,
  stop:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><rect x="9" y="9" width="6" height="6"/></svg>`,
  sq:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`,
  x:   `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

/* ── App state ── */
let appState = 'idle', ws, audioCtx;
let micStream, recorder, recChunks = [], silenceTimer = null;
let speechRec = null, useSpeechAPI = false;
let isRecording = false, recSeconds = 0, recInterval = null;
let activeMode = null; // 'search' | 'think' | 'canvas'
let stuckTimer = null;
let chatStarted = false;

/* ── WebSocket ── */
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen  = () => { setConn('ONLINE',  true);  };
  ws.onclose = () => { setConn('OFFLINE', false); setState('idle'); setTimeout(connect, 2500); };
  ws.onerror = () => {};
  ws.onmessage = async e => {
    const d = JSON.parse(e.data);
    if (d.type === 'boot') {
      if (d.audio) await playAudio(d.audio).catch(() => {});
      return;
    }
    if (d.type === 'state')      setState(d.state);
    if (d.type === 'response')   onResponse(d);
    if (d.type === 'transcript') addMsg('user', d.text);
    if (d.type === 'error')      console.error('[J]', d.message);
  };
}
function setConn(lbl, on) {
  document.getElementById('conn-lbl').textContent = lbl;
  document.getElementById('dot').className = on ? 'on' : '';
}
function wsSend(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

/* ── State machine ── */
function setState(s) {
  clearTimeout(stuckTimer); stuckTimer = null;
  appState = s;
  const dot = document.getElementById('s-dot');
  const txt = document.getElementById('status-txt');
  dot.className = 's-dot ' + s;
  txt.className = s;
  txt.textContent = ({idle:'READY',listening:'LISTENING',processing:'PROCESSING',speaking:'SPEAKING'})[s] || s.toUpperCase();
  const box = document.getElementById('prompt-box');
  (s === 'processing' || s === 'speaking') ? box.classList.add('loading') : box.classList.remove('loading');
  document.getElementById('chat-ta').disabled = (s === 'processing' || s === 'speaking');
  refreshBtn();
  if (s === 'processing' || s === 'speaking')
    stuckTimer = setTimeout(() => setState('idle'), 15000);
}

function refreshBtn() {
  const btn = document.getElementById('action-btn');
  const ta  = document.getElementById('chat-ta');
  if (appState === 'processing' || appState === 'speaking') {
    btn.className = 's-load';  btn.innerHTML = ICON.sq;
  } else if (isRecording) {
    btn.className = 's-rec';   btn.innerHTML = ICON.stop;
  } else if (ta.value.trim()) {
    btn.className = 's-text';  btn.innerHTML = ICON.up;
  } else {
    btn.className = 's-idle';  btn.innerHTML = ICON.mic;
  }
}

/* ── Enter chat mode (first message) ── */
function enterChatMode() {
  if (chatStarted) return;
  chatStarted = true;
  document.getElementById('welcome').classList.add('gone');
  document.getElementById('chat-header').classList.add('visible');
  document.getElementById('msgs-wrap').classList.add('visible');
  document.getElementById('app').classList.add('chat-mode');
  document.getElementById('page').classList.add('chat-mode');
}

/* ── Toggle buttons ── */
['search','think','canvas'].forEach(mode => {
  document.getElementById('tog-' + mode).addEventListener('click', () => {
    activeMode = activeMode === mode ? null : mode;
    ['search','think','canvas'].forEach(m => {
      const btn = document.getElementById('tog-' + m);
      btn.className = 'tog' + (activeMode === m ? ' active-' + m : '');
    });
  });
});

/* ── Textarea ── */
const ta = document.getElementById('chat-ta');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 240) + 'px';
  refreshBtn();
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

/* ── Action button ── */
document.getElementById('action-btn').addEventListener('click', () => {
  if (appState === 'processing' || appState === 'speaking') return;
  if (isRecording) { stopRecording(); return; }
  if (ta.value.trim()) { handleSend(); return; }
  toggleMic();
});

/* ── Send ── */
function handleSend() {
  const raw = ta.value.trim(); if (!raw) return;
  let text = raw;
  if (activeMode === 'search') text = `[Search: ${raw}]`;
  if (activeMode === 'think')  text = `[Think: ${raw}]`;
  if (activeMode === 'canvas') text = `[Canvas: ${raw}]`;
  sendQ(text);
  ta.value = ''; ta.style.height = 'auto'; refreshBtn();
}

function sendQ(text) {
  if (appState === 'processing' || appState === 'speaking') return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  wsSend({ type: 'text', text });
  addMsg('user', text);
}

/* ── Mic ── */
async function ensureMic() {
  if (micStream) return true;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    document.getElementById('perm').classList.remove('show');
    return true;
  } catch (_) {
    document.getElementById('perm').classList.add('show');
    return false;
  }
}

function initSpeechAPI() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  speechRec = new SR();
  speechRec.lang = 'en-US'; speechRec.interimResults = false; speechRec.continuous = false;
  speechRec.onresult = ev => {
    const t = Array.from(ev.results).map(r => r[0].transcript).join(' ').trim();
    if (t) {
      ta.value = t;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 240) + 'px';
      refreshBtn();
    }
    stopRecording();
    if (t) setTimeout(() => handleSend(), 200);
  };
  speechRec.onerror = ev => {
    if (ev.error === 'not-allowed') document.getElementById('perm').classList.add('show');
    stopRecording();
  };
  speechRec.onend = () => { if (isRecording) stopRecording(); };
  return true;
}

async function toggleMic() {
  if (appState === 'processing' || appState === 'speaking') return;
  if (isRecording) { stopRecording(); return; }
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const ok = await ensureMic(); if (!ok) return;
  if (!useSpeechAPI) useSpeechAPI = initSpeechAPI();
  startRecording();
}

function startRecording() {
  isRecording = true; recSeconds = 0;
  document.getElementById('prompt-box').classList.add('recording');
  ta.style.display = 'none';
  document.getElementById('rec-ui').classList.add('show');
  document.getElementById('left-acts').classList.add('rec-hide');
  buildWaveform();
  clearInterval(recInterval);
  recInterval = setInterval(() => {
    recSeconds++;
    const m = String(Math.floor(recSeconds / 60)).padStart(2, '0');
    const s = String(recSeconds % 60).padStart(2, '0');
    document.getElementById('rec-time').textContent = `${m}:${s}`;
  }, 1000);
  setState('listening');
  refreshBtn();
  if (useSpeechAPI && speechRec) {
    try { speechRec.start(); } catch (_) {
      try { speechRec.stop(); } catch (__) {}
      setTimeout(() => { try { speechRec.start(); } catch (__) {} }, 150);
    }
  } else {
    startMediaRecorder();
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(recInterval); recInterval = null;
  document.getElementById('prompt-box').classList.remove('recording');
  ta.style.display = 'block';
  document.getElementById('rec-ui').classList.remove('show');
  document.getElementById('left-acts').classList.remove('rec-hide');
  document.getElementById('rec-time').textContent = '00:00';
  if (useSpeechAPI && speechRec) { try { speechRec.stop(); } catch (_) {} }
  else if (recorder && recorder.state !== 'inactive') recorder.stop();
  if (appState === 'listening') setState('idle');
  refreshBtn();
}

function startMediaRecorder() {
  recChunks = [];
  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
  recorder = new MediaRecorder(micStream, { mimeType: mime });
  recorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  recorder.onstop = () => {
    const fr = new FileReader();
    fr.onloadend = () => { if (fr.result) wsSend({ type: 'audio', audio: fr.result.split(',')[1] }); };
    fr.readAsDataURL(new Blob(recChunks, { type: 'audio/webm' }));
    setState('processing');
  };
  const src = audioCtx.createMediaStreamSource(micStream);
  const ana = audioCtx.createAnalyser(); ana.fftSize = 256; src.connect(ana);
  const buf = new Uint8Array(ana.frequencyBinCount);
  function tick() {
    if (!isRecording) return;
    ana.getByteFrequencyData(buf);
    const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
    if (avg < 9) {
      if (!silenceTimer) silenceTimer = setTimeout(() => {
        silenceTimer = null;
        if (recorder && recorder.state !== 'inactive') recorder.stop();
        stopRecording();
      }, 1800);
    } else { clearTimeout(silenceTimer); silenceTimer = null; }
    requestAnimationFrame(tick);
  }
  recorder.start(100); tick();
}

function buildWaveform() {
  const w = document.getElementById('waveform'); w.innerHTML = '';
  for (let i = 0; i < 32; i++) {
    const b = document.createElement('div'); b.className = 'wave-bar';
    b.style.height = Math.max(15, Math.random() * 100) + '%';
    b.style.animationDelay = `${i * 0.05}s`;
    b.style.animationDuration = `${0.5 + Math.random() * 0.5}s`;
    w.appendChild(b);
  }
}

/* ── Audio playback ── */
async function playAudio(b64, onEnded) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const buf = await audioCtx.decodeAudioData(raw.buffer.slice(0));
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination);
  src.onended = () => { if (onEnded) onEnded(); };
  src.start(0);
}

async function onResponse(d) {
  addMsg('jarvis', d.text);
  if (!d.audio) { setState('idle'); return; }
  try {
    await playAudio(d.audio, () => setState('idle'));
  } catch (e) { console.error('[J] audio:', e); setState('idle'); }
}

/* ── Messages ── */
function addMsg(role, text) {
  enterChatMode();
  const container = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  if (role === 'jarvis') {
    const av = document.createElement('div'); av.className = 'msg-av'; row.appendChild(av);
  }
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble'; bubble.textContent = text;
  row.appendChild(bubble);
  container.appendChild(row);
  while (container.children.length > 40) container.removeChild(container.firstChild);
  const wrap = document.getElementById('msgs-wrap');
  requestAnimationFrame(() => { wrap.scrollTop = wrap.scrollHeight; });
}

/* ── File attach ── */
document.getElementById('attach-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => showPreview(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value = '';
});

function showPreview(dataUrl) {
  const prev = document.getElementById('file-previews');
  prev.innerHTML = ''; prev.classList.add('show');
  const wrap = document.createElement('div'); wrap.className = 'file-thumb';
  wrap.onclick = () => openModal(dataUrl);
  const img = document.createElement('img'); img.src = dataUrl;
  const rm  = document.createElement('button'); rm.className = 'file-rm'; rm.innerHTML = ICON.x;
  rm.onclick = ev => { ev.stopPropagation(); prev.innerHTML = ''; prev.classList.remove('show'); };
  wrap.append(img, rm); prev.appendChild(wrap);
}

/* ── Image modal ── */
function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('img-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('img-modal').classList.remove('open');
  setTimeout(() => { document.getElementById('modal-img').src = ''; }, 200);
}

/* ── Paste image ── */
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items; if (!items) return;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      const file = items[i].getAsFile(); if (!file) continue;
      const reader = new FileReader();
      reader.onload = ev => showPreview(ev.target.result);
      reader.readAsDataURL(file);
      e.preventDefault(); break;
    }
  }
});

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); toggleMic(); }
});

/* ── Drag & drop on prompt box ── */
const pb = document.getElementById('prompt-box');
pb.addEventListener('dragover',  e => { e.preventDefault(); e.stopPropagation(); });
pb.addEventListener('dragleave', e => { e.preventDefault(); e.stopPropagation(); });
pb.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation();
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) {
    const reader = new FileReader();
    reader.onload = ev => showPreview(ev.target.result);
    reader.readAsDataURL(files[0]);
  }
});

/* ── Boot ── */
refreshBtn();
setState('idle');
connect();
</script>
</body>
</html>
